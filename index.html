        <section class="quiz-card" id="quiz-card">
          <section class="timer-wrap" aria-label="Czas na odpowiedź">
            <div class="timer-head">
              <span>Czas</span>
              <strong id="time-left">5.0 s</strong>
            </div>
            <div class="timer-bar" id="timer-bar">
              <div class="timer-bar__fill" id="timer-fill"></div>
            </div>
            <div class="timer-note">Mnożenie: 5 s, dzielenie: 8 s</div>
          </section>
          <div class="question-box" aria-live="polite">
            <span class="question-text" id="question-text">1 x 1 = ?</span>
            <span class="feedback-badge" id="feedback-badge">Wybierz odpowiedź</span>
          </div>
          <div class="answers-grid" id="answers-grid"></div>
        </section>

        <section class="success-card hidden" id="success-card">
          <h2>Udało się!</h2>
          <p>Smok jest już cały odkryty. Super praca!</p>
          <button type="button" class="restart-button restart-button--wide" id="play-again-button">
