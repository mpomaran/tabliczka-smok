<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Smocza Tabliczka</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell" id="app">
      <section class="app-panel">
        <header class="app-top">
          <div>
            <p class="eyebrow">Smocza tabliczka</p>
            <h1>Mnozenie i dzielenie do 100</h1>
          </div>
          <button type="button" class="restart-button" id="restart-button">Restart</button>
        </header>

        <section class="stats-panel" aria-label="Statystyki gry">
          <div class="stat-pill">
            <span class="stat-label">Smok</span>
            <strong id="revealed-count">0/100</strong>
          </div>
          <div class="stat-pill">
            <span class="stat-label">Dobre</span>
            <strong id="correct-count">0</strong>
          </div>
          <div class="stat-pill">
            <span class="stat-label">Bledne</span>
            <strong id="wrong-count">0</strong>
          </div>
        </section>

        <section class="dragon-card">
          <div class="dragon-stage" aria-label="Odslaniany smok">
            <div class="dragon-image">
              <svg viewBox="0 0 600 600" role="img" aria-label="Przyjazny smok">
                <defs>
                  <linearGradient id="bgGlow" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#f8f2d5" />
                    <stop offset="100%" stop-color="#f7b267" />
                  </linearGradient>
                  <linearGradient id="dragonBody" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#7bd389" />
                    <stop offset="100%" stop-color="#2a9d8f" />
                  </linearGradient>
                  <linearGradient id="dragonBelly" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#fff0c2" />
                    <stop offset="100%" stop-color="#ffd166" />
                  </linearGradient>
                  <linearGradient id="wingFill" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#9cf6c8" />
                    <stop offset="100%" stop-color="#4dbb9e" />
                  </linearGradient>
                </defs>
                <rect width="600" height="600" rx="56" fill="url(#bgGlow)" />
                <circle cx="100" cy="100" r="28" fill="#fff8dc" opacity="0.6" />
                <circle cx="530" cy="120" r="24" fill="#fff8dc" opacity="0.45" />
                <circle cx="510" cy="510" r="34" fill="#fff8dc" opacity="0.35" />
                <path d="M132 390c24-98 96-154 181-154 42 0 75 11 104 31 40 27 61 72 61 121 0 72-55 127-136 127H250c-83 0-136-44-136-125Z" fill="url(#dragonBody)" />
                <path d="M230 333c17-18 39-30 67-30 49 0 88 39 88 88s-39 88-88 88c-59 0-104-56-92-114 4-12 12-24 25-32Z" fill="url(#dragonBelly)" />
                <path d="M255 245c-6-69 39-124 101-124 78 0 139 75 105 163-17 44-56 67-101 67-61 0-100-44-105-106Z" fill="url(#dragonBody)" />
                <path d="M362 174c56-52 126-49 153 15 19 44 8 103-26 136-29 27-83 47-118 33 25-23 43-54 48-99 4-33-11-62-57-85Z" fill="url(#wingFill)" />
                <path d="M262 203c-37-46-96-57-134-18-29 30-36 79-18 119 14 32 45 58 76 66-17-31-20-63-8-101 10-31 37-51 84-66Z" fill="url(#wingFill)" />
                <path d="M170 407c-65 21-86 61-81 104 7 52 51 81 110 81 43 0 78-14 94-43-54-1-86-18-101-48-12-24-11-56-22-94Z" fill="url(#dragonBody)" />
                <path d="M416 413c66 17 101 57 102 107 2 45-34 72-84 72-41 0-76-16-94-39 38-7 63-22 77-45 18-29 15-60-1-95Z" fill="url(#dragonBody)" />
                <path d="M474 230c30-38 67-53 97-43 18 6 30 24 29 45-2 34-25 59-62 68 11-26 7-48-10-70-13-16-31-24-54-24Z" fill="#f4a261" />
                <circle cx="316" cy="228" r="13" fill="#173f35" />
                <circle cx="321" cy="223" r="4" fill="#ffffff" />
                <circle cx="304" cy="260" r="9" fill="#ff9f9f" opacity="0.7" />
                <path d="M300 279c15 14 39 14 55 0" fill="none" stroke="#173f35" stroke-width="8" stroke-linecap="round" />
                <path d="M266 139l19-47 26 39" fill="#ffd166" />
                <path d="M390 135l28-44 16 45" fill="#ffd166" />
                <path d="M201 471c25 20 57 22 82 7" fill="none" stroke="#1f6f66" stroke-width="12" stroke-linecap="round" />
                <path d="M357 476c25 18 54 16 75-2" fill="none" stroke="#1f6f66" stroke-width="12" stroke-linecap="round" />
                <path d="M143 392c-18 9-31 28-35 51" fill="none" stroke="#1f6f66" stroke-width="12" stroke-linecap="round" />
                <path d="M456 392c17 8 33 28 38 53" fill="none" stroke="#1f6f66" stroke-width="12" stroke-linecap="round" />
                <path d="M263 346c-10 31-6 66 11 92" fill="none" stroke="#e1b84b" stroke-width="10" stroke-linecap="round" />
                <path d="M342 344c10 31 7 66-9 92" fill="none" stroke="#e1b84b" stroke-width="10" stroke-linecap="round" />
              </svg>
            </div>
            <div class="dragon-cover" id="dragon-cover" aria-hidden="true"></div>
          </div>
          <div class="dragon-caption">
            Odkryte pola: <strong id="dragon-progress">0/100</strong>
          </div>
        </section>

        <section class="quiz-card" id="quiz-card">
          <section class="timer-wrap" aria-label="Czas na odpowiedz">
            <div class="timer-head">
              <span>Czas</span>
              <strong id="time-left">5.0 s</strong>
            </div>
            <div class="timer-bar" id="timer-bar">
              <div class="timer-bar__fill" id="timer-fill"></div>
            </div>
            <div class="timer-note">Mnozenie: 5 s, dzielenie: 8 s</div>
          </section>
          <div class="question-box" aria-live="polite">
            <span class="question-text" id="question-text">1 x 1 = ?</span>
            <span class="feedback-badge" id="feedback-badge">Wybierz odpowiedz</span>
          </div>
          <div class="answers-grid" id="answers-grid"></div>
        </section>

        <section class="success-card hidden" id="success-card">
          <h2>Udalo sie!</h2>
          <p>Smok jest juz caly odkryty. Super praca!</p>
          <button type="button" class="restart-button restart-button--wide" id="play-again-button">
            Zagraj jeszcze raz
          </button>
        </section>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
